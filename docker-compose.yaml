services:
  app:
    container_name: orchard
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.app
      args:
        - CARGO_TARGET_DIR=/cargo-target
    ports:
      - "8000:8000"  
    environment:
      - PORT=8000
    env_file:
      - ".env"
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
        # condition: service_healthy
    networks:
      - internal
    volumes:
      - .:/app:cached
      - cargo-target:/cargo-target:delegated
      - rust-cache:/usr/local/cargo/registry:delegated
    # command: cargo watch -qcx run
    stdin_open: true
    tty: true
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 10
    #   start_period: 30s

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - "6543:5432"          # expose externally on 6543
    networks:
      - internal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DATABASE_NAME} -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@orchard.com
      PGADMIN_DEFAULT_PASSWORD: orchard
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    networks:
      - internal

