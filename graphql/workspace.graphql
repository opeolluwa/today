mutation SyncWorkspaces {
  sync_workspace(
    input: [
      {
        identifier: "e2f3a4b5-c6d7-8901-5678-012345678901"
        name: "Personal"
        description: "Default personal workspace"
        is_default: true
        is_hidden: false
        is_secured: false
        password_hash: null
        created_at: "2026-01-01T00:00:00+00:00"
        updated_at: "2026-04-01T08:00:00+00:00"
      }
      {
        identifier: "f3a4b5c6-d7e8-9012-6789-123456789012"
        name: "Work"
        description: "Work-related tasks and notes"
        is_default: false
        is_hidden: false
        is_secured: false
        password_hash: null
        created_at: "2026-02-10T09:00:00+00:00"
        updated_at: "2026-04-15T10:30:00+00:00"
      }
      {
        identifier: "a4b5c6d7-e8f9-0123-7890-234567890123"
        name: "Private"
        description: "Secured private workspace"
        is_default: false
        is_hidden: true
        is_secured: true
        password_hash: "$argon2id$v=19$m=65536,t=3,p=4$somesalt$hashedvalue"
        created_at: "2026-03-05T12:00:00+00:00"
        updated_at: "2026-03-05T12:00:00+00:00"
      }
    ]
  ) {
    success
    error_message
    identifier
  }
}



query FindWorkSpaces {
  workspaces {
    nodes {
      identifier
      name
      createdAt
      isHidden
      isDefault
      isSecured
      description
    }
  }
}